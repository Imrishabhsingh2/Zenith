<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Skincare Metronome | The Zenith

  </title>
  
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gold: { DEFAULT: '#C9A84C', light: '#E8C97A', dark: '#8C6D25' } },
          fontFamily: {
            display: ['Cormorant Garamond', 'serif'],
            heading: ['Bebas Neue', 'sans-serif'],
            body: ['Montserrat', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Montserrat', sans-serif; background: #0d0d0d; color: #e8e0d0; overflow-x: hidden; overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }
    
    main {
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(90px + env(safe-area-inset-bottom));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .glass { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(16px); border: 1px solid rgba(201, 168, 76, 0.15); border-radius: 16px; transition: all 0.4s ease; }
    
    .btn-primary { background: linear-gradient(135deg, #C9A84C 0%, #E8C97A 50%, #C9A84C 100%); color: #0d0d0d; font-weight: 600; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 16px; border: none; border-radius: 8px; width: 100%; cursor: pointer; transition: transform 0.2s; }
    .btn-primary:active { transform: scale(0.98); }
    
    .btn-ghost { background: transparent; color: #C9A84C; font-weight: 600; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 15px; border: 1px solid rgba(201, 168, 76, 0.45); border-radius: 8px; width: 100%; cursor: pointer; transition: all 0.2s; }
    .btn-ghost:active { background: rgba(201, 168, 76, 0.1); }

    /* ── Timer Circle ── */
    .timer-wrapper { position: relative; width: 140px; height: 140px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
    .timer-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .timer-circle-bg { fill: none; stroke: rgba(201, 168, 76, 0.1); stroke-width: 4; }
    .timer-circle-progress { fill: none; stroke: #C9A84C; stroke-width: 4; stroke-dasharray: 283; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; stroke-linecap: round; }
    .timer-text { position: absolute; font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: #e8e0d0; top: 50%; left: 50%; transform: translate(-50%, -46%); letter-spacing: 0.05em; }

    /* ── Ultra-Premium Floating Glass Dock ── */
    .bottom-nav {
      position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: auto; min-width: 280px;
      background: rgba(15, 15, 15, 0.35); backdrop-filter: blur(36px) saturate(220%); -webkit-backdrop-filter: blur(36px) saturate(220%);
      border: 1px solid rgba(201, 168, 76, 0.2); border-top: 1px solid rgba(201, 168, 76, 0.4); border-radius: 99px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      display: flex; justify-content: space-evenly; align-items: center; height: 64px; z-index: 1000; padding: 0 12px; gap: 8px;
    }
    .nav-item { display: flex; align-items: center; justify-content: center; color: #6a6055; text-decoration: none; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); width: 44px; height: 44px; border-radius: 50%; background: transparent; }
    .nav-item.active { color: #C9A84C; background: rgba(201, 168, 76, 0.12); border: 1px solid rgba(201, 168, 76, 0.25); box-shadow: 0 0 16px rgba(201, 168, 76, 0.15), inset 0 0 8px rgba(201, 168, 76, 0.1); }
    .nav-item svg { width: 22px; height: 22px; stroke: currentColor; transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
    .nav-item.active svg { transform: scale(1.15); filter: drop-shadow(0 2px 6px rgba(201, 168, 76, 0.5)); }

    /* Fade transition for steps */
    #routine-card { opacity: 1; transition: opacity 0.3s ease, transform 0.3s ease; }
    #routine-card.fade-out { opacity: 0; transform: translateY(10px); }
  </style>
</head>

<body>

  <main class="px-5 py-6">
    
    <div class="mb-6 pt-4 flex justify-between items-start">
      <div>
        <p style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.15em;color:#C9A84C;">PILLAR II UTILITY</p>
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:#e8e0d0;line-height:1.1;">Skincare Metronome.</h1>
      </div>
    </div>

    <div class="flex gap-2 mb-8 bg-[#1a1a1a] p-1 rounded-lg" id="mode-selector">
      <button class="flex-1 py-2 text-[0.7rem] uppercase tracking-widest rounded-md bg-[#C9A84C] text-[#0d0d0d] font-bold transition-all" id="btn-am" onclick="setMode('AM')">AM Routine</button>
      <button class="flex-1 py-2 text-[0.7rem] uppercase tracking-widest rounded-md text-[#9a9080] font-medium transition-all" id="btn-pm" onclick="setMode('PM')">PM Routine</button>
    </div>

    <div id="routine-card" class="glass p-6 flex flex-col items-center text-center flex-grow justify-center mb-6">
      
      <p id="step-count" class="text-[0.7rem] uppercase tracking-[0.2em] text-[#C9A84C] mb-2">Step 1 of 3</p>
      <h2 id="step-title" class="font-['Cormorant_Garamond'] text-3xl text-[#e8e0d0] mb-4">Cleanse & Purify</h2>
      <p id="step-desc" class="text-[0.85rem] text-[#9a9080] mb-8 max-w-[250px]">Massage cleanser into damp skin using circular motions to remove overnight buildup.</p>

      <div class="timer-wrapper mb-8">
        <svg class="timer-svg" viewBox="0 0 100 100">
          <circle class="timer-circle-bg" cx="50" cy="50" r="45"></circle>
          <circle id="progress-ring" class="timer-circle-progress" cx="50" cy="50" r="45"></circle>
        </svg>
        <span id="time-display" class="timer-text">60</span>
      </div>

      <div class="w-full space-y-3">
        <button id="action-btn" onclick="toggleTimer()" class="btn-primary">Start Timer</button>
        <button id="skip-btn" onclick="nextStep()" class="btn-ghost">Skip Step</button>
      </div>

    </div>

  </main>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
    </a>
    <a href="wardrobe.html" class="nav-item">
      <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
    </a>
    <a href="#" class="nav-item active">
      <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
    </a>
    <a href="profile.html" class="nav-item">
      <svg fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
    </a>
  </nav>

  <script>
    const routines = {
      AM: [
        { title: "Cleanse & Purify", desc: "Massage gentle cleanser into damp skin using upward circular motions.", time: 60 },
        { title: "Vitamin C Serum", desc: "Pat serum firmly into face and neck. Let it absorb completely.", time: 30 },
        { title: "Moisturize & SPF", desc: "Apply a generous layer of SPF 50 moisturizer. Do not skip.", time: 0 } // 0 means no timer needed
      ],
      PM: [
        { title: "Double Cleanse", desc: "Use a heavy cleanser to break down daily SPF and urban grit.", time: 60 },
        { title: "Retinol / Actives", desc: "Apply a pea-sized amount to dry skin. Wait for full absorption.", time: 45 },
        { title: "Barrier Repair Cream", desc: "Lock in hydration with a heavy ceramide cream overnight.", time: 0 }
      ]
    };

    let currentMode = 'AM';
    let currentStep = 0;
    
    // Timer Variables
    let timeRemaining = 0;
    let timerInterval = null;
    let isRunning = false;
    const fullDash = 283; // Circumference of the SVG circle

    function setMode(mode) {
      if (isRunning) toggleTimer(); // stop if running
      currentMode = mode;
      currentStep = 0;

      // Update UI tabs
      const btnAm = document.getElementById('btn-am');
      const btnPm = document.getElementById('btn-pm');

      if(mode === 'AM') {
        btnAm.className = "flex-1 py-2 text-[0.7rem] uppercase tracking-widest rounded-md bg-[#C9A84C] text-[#0d0d0d] font-bold transition-all";
        btnPm.className = "flex-1 py-2 text-[0.7rem] uppercase tracking-widest rounded-md text-[#9a9080] font-medium transition-all";
      } else {
        btnPm.className = "flex-1 py-2 text-[0.7rem] uppercase tracking-widest rounded-md bg-[#C9A84C] text-[#0d0d0d] font-bold transition-all";
        btnAm.className = "flex-1 py-2 text-[0.7rem] uppercase tracking-widest rounded-md text-[#9a9080] font-medium transition-all";
      }

      loadStep();
    }

    function loadStep() {
      const card = document.getElementById('routine-card');
      const data = routines[currentMode][currentStep];
      
      // Fade out effect
      card.classList.add('fade-out');
      
      setTimeout(() => {
        document.getElementById('step-count').innerText = `Step ${currentStep + 1} of ${routines[currentMode].length}`;
        document.getElementById('step-title').innerText = data.title;
        document.getElementById('step-desc').innerText = data.desc;
        
        // Setup timer
        timeRemaining = data.time;
        updateTimerDisplay();
        document.getElementById('progress-ring').style.strokeDashoffset = 0;
        document.getElementById('progress-ring').style.transition = 'none'; // reset transition instantly

        const actionBtn = document.getElementById('action-btn');
        const skipBtn = document.getElementById('skip-btn');
        
        if (data.time === 0) {
          actionBtn.innerText = "Complete Routine";
          skipBtn.style.display = "none";
          document.querySelector('.timer-wrapper').style.opacity = '0.2'; // dim timer if not needed
          document.getElementById('time-display').innerText = "✓";
        } else {
          actionBtn.innerText = "Start Timer";
          skipBtn.style.display = "block";
          skipBtn.innerText = "Skip Step";
          document.querySelector('.timer-wrapper').style.opacity = '1';
        }

        // Fade in
        card.classList.remove('fade-out');
      }, 300);
    }

    function updateTimerDisplay() {
      document.getElementById('time-display').innerText = timeRemaining;
    }

    function toggleTimer() {
      const data = routines[currentMode][currentStep];
      
      // Handle the final step (which has no timer)
      if(data.time === 0) {
        alert("Routine complete. Master the day.");
        setMode(currentMode); // reset for demo purposes
        return;
      }

      const actionBtn = document.getElementById('action-btn');
      const ring = document.getElementById('progress-ring');

      if (isRunning) {
        // Pause
        clearInterval(timerInterval);
        isRunning = false;
        actionBtn.innerText = "Resume Timer";
        ring.style.transition = 'none';
      } else {
        // Start
        isRunning = true;
        actionBtn.innerText = "Pause Timer";
        
        ring.style.transition = 'stroke-dashoffset 1s linear';

        timerInterval = setInterval(() => {
          timeRemaining--;
          updateTimerDisplay();

          // Calculate ring progress
          const progress = timeRemaining / data.time;
          const offset = fullDash - (progress * fullDash);
          ring.style.strokeDashoffset = offset;

          if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            isRunning = false;
            // Provide haptic feedback if the device supports it
            if (navigator.vibrate) navigator.vibrate(200); 
            nextStep();
          }
        }, 1000);
      }
    }

    function nextStep() {
      if (isRunning) {
        clearInterval(timerInterval);
        isRunning = false;
      }
      
      if (currentStep < routines[currentMode].length - 1) {
        currentStep++;
        loadStep();
      } else {
        alert("Routine complete. Master the day.");
        setMode(currentMode);
      }
    }

    // Initialize first load
    loadStep();
  </script>

</body>
</html>
