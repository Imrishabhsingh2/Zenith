  <style>
    /* ── Custom Premium Cursor ── */
    @media (pointer: fine) {
      body, a, button { cursor: none !important; }
      .cursor-dot { position: fixed !important; pointer-events: none !important; top: 0; left: 0; width: 6px; height: 6px; background-color: #C9A84C; border-radius: 50%; z-index: 99999 !important; transform: translate(-50%, -50%); transition: transform 0.2s ease; }
      .cursor-ring { position: fixed !important; pointer-events: none !important; top: 0; left: 0; width: 34px; height: 34px; border: 1px solid rgba(201, 168, 76, 0.4); background: rgba(201, 168, 76, 0.05); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); border-radius: 50%; z-index: 99998 !important; transform: translate(-50%, -50%); transition: width 0.3s ease, height 0.3s ease, background 0.3s ease, border-color 0.3s ease; }
      .cursor-ring.hovered { width: 56px; height: 56px; background: rgba(201, 168, 76, 0.1); border-color: rgba(201, 168, 76, 0.8); }
      .cursor-dot.hovered { transform: translate(-50%, -50%) scale(0.5); }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background-color: #0d0d0d; overflow-x: hidden; }
    body { font-family: 'Montserrat', sans-serif; background-color: #0d0d0d; color: #e8e0d0; overflow-x: hidden; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    
    main { padding-top: env(safe-area-inset-top); padding-bottom: calc(100px + env(safe-area-inset-bottom)); max-width: 600px; margin: 0 auto; }

    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(201, 168, 76, 0.15); border-radius: 16px; position: relative; overflow: hidden; }
    
    .btn-primary { background: linear-gradient(135deg, #C9A84C 0%, #E8C97A 50%, #C9A84C 100%); color: #0d0d0d; font-weight: 600; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 18px; border: none; border-radius: 8px; width: 100%; cursor: pointer; transition: all 0.3s ease; }
    .btn-primary.acknowledged { background: rgba(201, 168, 76, 0.1); color: #C9A84C; border: 1px solid #C9A84C; pointer-events: none; }

    /* Bottom Dock */
    .bottom-nav { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: auto; min-width: 280px; background: rgba(15, 15, 15, 0.35); backdrop-filter: blur(36px) saturate(220%); -webkit-backdrop-filter: blur(36px) saturate(220%); border: 1px solid rgba(201, 168, 76, 0.2); border-top: 1px solid rgba(201, 168, 76, 0.4); border-radius: 99px; box-shadow: 0 24px 48px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05); display: flex; justify-content: space-evenly; align-items: center; height: 64px; z-index: 1000; padding: 0 12px; gap: 8px; }
    .nav-item { display: flex; align-items: center; justify-content: center; color: #6a6055; text-decoration: none; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); width: 44px; height: 44px; border-radius: 50%; background: transparent; }
    .nav-item.active { color: #C9A84C; background: rgba(201, 168, 76, 0.12); border: 1px solid rgba(201, 168, 76, 0.25); box-shadow: 0 0 16px rgba(201, 168, 76, 0.15), inset 0 0 8px rgba(201, 168, 76, 0.1); }
    .nav-item svg { width: 22px; height: 22px; stroke: currentColor; transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
    .nav-item.active svg { transform: scale(1.15); filter: drop-shadow(0 2px 6px rgba(201, 168, 76, 0.5)); }

    /* Quote Watermark */
    .quote-mark { position: absolute; top: -10px; left: 10px; font-family: 'Cormorant Garamond', serif; font-size: 8rem; color: rgba(201, 168, 76, 0.05); line-height: 1; pointer-events: none; z-index: 0; }
  </style>

<body>
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <main class="px-5 py-6">
    
    <div class="flex justify-between items-start mb-8 pt-4">
      <div>
        <p id="date-display" style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.15em;color:#C9A84C;">LOADING...</p>
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:#e8e0d0;line-height:1.1;">Morning Dispatch.</h1>
      </div>
      <span style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:#6a6055;border:1px solid rgba(201,168,76,0.3);padding:4px 8px;border-radius:4px;">1 Min Read</span>
    </div>

    <section class="mb-6">
      <h2 style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:#9a9080;margin-bottom:12px;margin-left:4px;">Daily Calibration</h2>
      <div class="glass p-6 min-h-[160px] flex flex-col justify-center">
        <div class="quote-mark">"</div>
        <p id="dispatch-quote" style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:#e8e0d0;line-height:1.3;margin-bottom:16px;z-index:1;position:relative;font-style:italic;">
          Loading insight...
        </p>
        <p id="dispatch-author" style="font-size:0.75rem;color:#C9A84C;letter-spacing:0.1em;text-transform:uppercase;z-index:1;position:relative;">— Processing</p>
      </div>
    </section>

    <section class="mb-10">
      <h2 style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:#9a9080;margin-bottom:12px;margin-left:4px;">Tactical Briefing</h2>
      <div class="glass p-6">
        <h3 id="dispatch-title" style="font-size:0.9rem;font-weight:600;color:#e8e0d0;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.1em;">Loading...</h3>
        <p id="dispatch-body" style="font-size:0.85rem;color:#9a9080;line-height:1.8;">
          Fetching today's tactical protocol.
        </p>
      </div>
    </section>

    <button id="ack-btn" class="btn-primary flex justify-center items-center gap-2" onclick="acknowledgeDispatch()">
      Acknowledge Protocol
    </button>

  </main>

  <script>
    // 1. Set Today's Date dynamically
    const options = { weekday: 'long', month: 'long', day: 'numeric' };
    const today = new Date().toLocaleDateString('en-US', options).toUpperCase();
    document.getElementById('date-display').innerText = today;

    // 2. Dispatch Content Database
    // In a real app, this would be fetched from a server. Here we cycle based on the day of the year.
    const dispatches = [
      {
        quote: "You have power over your mind - not outside events. Realize this, and you will find strength.",
        author: "Marcus Aurelius",
        title: "The 3-Second Eye Contact Rule",
        body: "When introduced to someone new today, hold eye contact for exactly 3 seconds before breaking away to look at their hand for the shake. It registers subconsciously as deep confidence and commands immediate respect. Do not look away first; break contact intentionally."
      },
      {
        quote: "We suffer more often in imagination than in reality.",
        author: "Seneca",
        title: "The Posture Check",
        body: "Right now, drop your shoulders. Pull your scapula back and down. Breathe into your stomach, not your chest. A tight chest signals anxiety to your brain; a relaxed posture signals authority. Reset this posture every time you walk through a door today."
      },
      {
        quote: "First say to yourself what you would be; and then do what you have to do.",
        author: "Epictetus",
        title: "The Tailored Silhouette",
        body: "Your clothes must whisper, not shout. Today, evaluate your outfit: is the shoulder seam of your shirt sitting exactly on the corner of your shoulder bone? If it drops past it, the garment is wearing you. Pin it, tailor it, or discard it."
      }
    ];

    // Select dispatch based on the day of the year to ensure a new one every day
    const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
    const todaysDispatch = dispatches[dayOfYear % dispatches.length];

    // Inject Content
    document.getElementById('dispatch-quote').innerText = todaysDispatch.quote;
    document.getElementById('dispatch-author').innerText = `— ${todaysDispatch.author}`;
    document.getElementById('dispatch-title').innerText = todaysDispatch.title;
    document.getElementById('dispatch-body').innerText = todaysDispatch.body;

    // 3. Acknowledge Logic
    function acknowledgeDispatch() {
      const btn = document.getElementById('ack-btn');
      btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Protocol Acknowledged`;
      btn.classList.add('acknowledged');
      
      // Haptic feedback for mobile devices
      if (navigator.vibrate) navigator.vibrate(100);

      // Smooth redirect back to dashboard after 1 second
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
    }

    // Custom Cursor Logic
    if (window.matchMedia("(pointer: fine)").matches) {
      const dot = document.querySelector('.cursor-dot');
      const ring = document.querySelector('.cursor-ring');
      let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY;
        if(dot) { dot.style.left = `${mouseX}px`; dot.style.top = `${mouseY}px`; }
      });

      function animateRing() {
        ringX += (mouseX - ringX) * 0.15; ringY += (mouseY - ringY) * 0.15;
        if(ring) { ring.style.left = `${ringX}px`; ring.style.top = `${ringY}px`; }
        requestAnimationFrame(animateRing);
      }
      animateRing();

      const interactables = document.querySelectorAll('a, button');
      interactables.forEach(el => {
        el.addEventListener('mouseenter', () => {
          if(ring) ring.classList.add('hovered');
          if(dot) dot.classList.add('hovered');
        });
        el.addEventListener('mouseleave', () => {
          if(ring) ring.classList.remove('hovered');
          if(dot) dot.classList.remove('hovered');
        });
      });
    }
  </script>
  <script src="ai-core.js"></script>
