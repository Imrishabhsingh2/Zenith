<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Contact Concierge | The Zenith</title>
  
  <script>
    if (localStorage.getItem('zenith_auth') !== 'true') {
      window.location.href = 'login.html';
    }
  </script>
  
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: { DEFAULT: '#C9A84C', light: '#E8C97A', dark: '#8C6D25' },
            charcoal: { DEFAULT: '#1A1A1A', 800: '#252525' },
          },
          fontFamily: {
            display: ['Cormorant Garamond', 'serif'],
            heading: ['Bebas Neue', 'sans-serif'],
            body: ['Montserrat', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* ── Custom Premium Cursor (Desktop Only) ── */
    @media (pointer: fine) {
      body, a, button, input, select, textarea, .nav-item, .toggle-switch { cursor: none !important; }
      .cursor-dot { position: fixed !important; pointer-events: none !important; top: 0; left: 0; width: 6px; height: 6px; background-color: #C9A84C; border-radius: 50%; z-index: 99999 !important; transform: translate(-50%, -50%); transition: transform 0.2s ease; }
      .cursor-ring { position: fixed !important; pointer-events: none !important; top: 0; left: 0; width: 34px; height: 34px; border: 1px solid rgba(201, 168, 76, 0.4); background: rgba(201, 168, 76, 0.05); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); border-radius: 50%; z-index: 99998 !important; transform: translate(-50%, -50%); transition: width 0.3s ease, height 0.3s ease, background 0.3s ease, border-color 0.3s ease; }
      .cursor-ring.hovered { width: 56px; height: 56px; background: rgba(201, 168, 76, 0.1); border-color: rgba(201, 168, 76, 0.8); }
      .cursor-dot.hovered { transform: translate(-50%, -50%) scale(0.5); }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    html { background-color: #0d0d0d; overflow-x: hidden; }
    body { font-family: 'Montserrat', sans-serif; background-color: #0d0d0d; color: #e8e0d0; overflow-x: hidden; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    
    main { padding-top: env(safe-area-inset-top); padding-bottom: calc(100px + env(safe-area-inset-bottom)); max-width: 800px; margin: 0 auto; }

    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(201, 168, 76, 0.15); border-radius: 16px; }
    
    .input-field {
      width: 100%;
      background: rgba(15, 15, 15, 0.5);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      color: #e8e0d0;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      outline: none;
    }
    
    .input-field:focus {
      border-color: rgba(201, 168, 76, 0.8);
      box-shadow: 0 0 12px rgba(201, 168, 76, 0.1);
      background: rgba(20, 20, 20, 0.8);
    }

    .input-field::placeholder {
      color: #6a6055;
    }

    .btn-primary {
      background: linear-gradient(135deg, #C9A84C, #8C6D25);
      color: #0d0d0d;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 12px rgba(201, 168, 76, 0.2);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(201, 168, 76, 0.3);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
  </style>
</head>

<body>
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <main class="px-5 py-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8 pt-4">
      <a href="profile.html" class="w-10 h-10 flex items-center justify-center rounded-full glass hover:bg-white/5 transition-colors">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:#C9A84C;line-height:1;">Concierge</h1>
      <div class="w-10 h-10"></div> <!-- Spacer for centering -->
    </div>

    <!-- Intro Text -->
    <div class="text-center mb-10">
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:#e8e0d0;line-height:1.1;margin-bottom:8px;">At Your Service</h2>
      <p style="font-size:0.85rem;color:#9a9080;line-height:1.6;">Our dedicated concierge team is available 24/7 to assist you with inquiries, event bookings, and bespoke requests.</p>
    </div>

    <!-- Contact Form -->
    <section class="glass p-6 mb-8">
      <form id="contact-form" onsubmit="handleFormSubmit(event)" class="flex flex-col gap-5">
        
        <div>
          <label style="display:block;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:#9a9080;margin-bottom:6px;margin-left:4px;">Request Type</label>
          <div class="relative">
            <select class="input-field appearance-none cursor-pointer">
              <option value="general">General Inquiry</option>
              <option value="support">Technical Support</option>
              <option value="billing">Billing & Subscription</option>
              <option value="bespoke">Bespoke Arrangement</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-[#C9A84C]">
              <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" class="w-4 h-4"><path d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>

        <div>
          <label style="display:block;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:#9a9080;margin-bottom:6px;margin-left:4px;">Subject</label>
          <input type="text" class="input-field" placeholder="Brief subject of your request" required>
        </div>

        <div>
          <label style="display:block;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:#9a9080;margin-bottom:6px;margin-left:4px;">Message</label>
          <textarea class="input-field" rows="5" placeholder="Detail your request here..." required></textarea>
        </div>

        <button type="submit" class="btn-primary mt-2">Dispatch Request</button>
        <p id="success-message" style="display:none;color:#4caf50;font-size:0.85rem;text-align:center;margin-top:8px;">Request dispatched successfully. A concierge will be with you shortly.</p>
      </form>
    </section>

    <!-- Direct Contact Info -->
    <section class="text-center mb-6">
      <h3 style="font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:#6a6055;margin-bottom:16px;">Direct Line</h3>
      <div class="flex flex-col gap-4">
        <a href="mailto:concierge@thezenith.com" style="display:flex;align-items:center;justify-content:center;gap:8px;color:#e8e0d0;text-decoration:none;font-size:0.9rem;" class="hover:text-[#C9A84C] transition-colors">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          concierge@thezenith.com
        </a>
      </div>
    </section>

  </main>

  <script>
    // Custom Premium Cursor Logic
    if (window.matchMedia("(pointer: fine)").matches) {
      const dot = document.querySelector('.cursor-dot');
      const ring = document.querySelector('.cursor-ring');
      let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY;
        if(dot) { dot.style.left = `${mouseX}px`; dot.style.top = `${mouseY}px`; }
      });

      function animateRing() {
        ringX += (mouseX - ringX) * 0.15; ringY += (mouseY - ringY) * 0.15;
        if(ring) { ring.style.left = `${ringX}px`; ring.style.top = `${ringY}px`; }
        requestAnimationFrame(animateRing);
      }
      animateRing();

      const interactables = document.querySelectorAll('a, button, input, select, textarea, .toggle-switch, .nav-item');
      interactables.forEach(el => {
        el.addEventListener('mouseenter', () => {
          if(ring) ring.classList.add('hovered');
          if(dot) dot.classList.add('hovered');
        });
        el.addEventListener('mouseleave', () => {
          if(ring) ring.classList.remove('hovered');
          if(dot) dot.classList.remove('hovered');
        });
      });
    }

    function handleFormSubmit(event) {
      event.preventDefault();
      const btn = event.target.querySelector('button[type="submit"]');
      const msg = document.getElementById('success-message');
      
      btn.innerText = 'Dispatching...';
      btn.disabled = true;
      btn.style.opacity = '0.7';
      
      // Simulate API call
      setTimeout(() => {
        btn.innerText = 'Dispatch Request';
        btn.disabled = false;
        btn.style.opacity = '1';
        event.target.reset();
        
        msg.style.display = 'block';
        setTimeout(() => {
          msg.style.display = 'none';
        }, 4000);
      }, 1500);
    }
  </script>
</body>
</html>
