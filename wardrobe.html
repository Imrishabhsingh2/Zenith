  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gold: { DEFAULT: '#C9A84C', light: '#E8C97A', dark: '#8C6D25' } },
          fontFamily: {

  <style>
    /* ── Custom Premium Cursor (Desktop Only) ── */
    @media (pointer: fine) {
      /* Hide the default system cursor */
      body, a, button, input, select, textarea, .filter-btn, .nav-item, .task-row {
        cursor: none !important;
      }

      /* The sharp center point */
      .cursor-dot {
        position: fixed !important; 
        pointer-events: none !important; 
        top: 0;
        left: 0;
        width: 6px;
        height: 6px;
        background-color: #C9A84C;
        border-radius: 50%;
        z-index: 99999 !important;
        transform: translate(-50%, -50%);
        transition: transform 0.2s ease;
      }

      /* The smooth trailing glass ring */
      .cursor-ring {
        position: fixed !important; 
        pointer-events: none !important; 
        top: 0;
        left: 0;
        width: 34px;
        height: 34px;
        border: 1px solid rgba(201, 168, 76, 0.4);
        background: rgba(201, 168, 76, 0.05);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
        border-radius: 50%;
        z-index: 99998 !important;
        transform: translate(-50%, -50%);
        transition: width 0.3s ease, height 0.3s ease, background 0.3s ease, border-color 0.3s ease;
      }

      /* The expanded state when hovering */
      .cursor-ring.hovered {
        width: 56px;
        height: 56px;
        background: rgba(201, 168, 76, 0.1);
        border-color: rgba(201, 168, 76, 0.8);
      }
      
      .cursor-dot.hovered {
        transform: translate(-50%, -50%) scale(0.5);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Montserrat', sans-serif; background: #0d0d0d; color: #e8e0d0; overflow-x: hidden; overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }
    
    main {
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(90px + env(safe-area-inset-bottom));
    }

    .glass { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(16px); border: 1px solid rgba(201, 168, 76, 0.15); border-radius: 16px; }
    .glass-input { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 8px; padding: 14px 16px; color: #e8e0d0; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; appearance: none; }
    .glass-input:focus { outline: none; border-color: rgba(201, 168, 76, 0.7); background: rgba(255, 255, 255, 0.06); }
    select.glass-input option { background: #0d0d0d; color: #e8e0d0; }
    
    /* ── Ultra-Premium Floating Glass Dock ── */
    .bottom-nav {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: auto;
      min-width: 280px;
      
      background: rgba(15, 15, 15, 0.35);
      backdrop-filter: blur(36px) saturate(220%);
      -webkit-backdrop-filter: blur(36px) saturate(220%);
      
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-top: 1px solid rgba(201, 168, 76, 0.4);
      border-radius: 99px;
      
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      height: 64px;
      z-index: 1000;
      padding: 0 12px;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6a6055;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: transparent;
    }

    .nav-item.active {
      color: #C9A84C;
      background: rgba(201, 168, 76, 0.12);
      border: 1px solid rgba(201, 168, 76, 0.25);
      box-shadow: 0 0 16px rgba(201, 168, 76, 0.15), inset 0 0 8px rgba(201, 168, 76, 0.1);
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .nav-item.active svg {
      transform: scale(1.15);
      filter: drop-shadow(0 2px 6px rgba(201, 168, 76, 0.5));
    }
    
    /* Animation for the outfit result */
    #outfit-result { display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; }
    #outfit-result.visible { display: block; opacity: 1; transform: translateY(0); }
  </style>
</head>

  <script>
    // ═══════════════════════════════════════════
    // CUSTOM PREMIUM CURSOR LOGIC
    // ═══════════════════════════════════════════
    if (window.matchMedia("(pointer: fine)").matches) {
      const dot = document.querySelector('.cursor-dot');
      const ring = document.querySelector('.cursor-ring');
      
      let mouseX = 0;
      let mouseY = 0;
      let ringX = 0;
      let ringY = 0;

      // Track the exact mouse coordinates safely during scroll
      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        
        if(dot) {
          dot.style.left = `${mouseX}px`;
          dot.style.top = `${mouseY}px`;
        }
      });

      // Smoothly animate the trailing ring
      function animateRing() {
        ringX += (mouseX - ringX) * 0.15;
        ringY += (mouseY - ringY) * 0.15;
        
        if(ring) {
          ring.style.left = `${ringX}px`;
          ring.style.top = `${ringY}px`;
        }
        
        requestAnimationFrame(animateRing);
      }
      animateRing();

      // Expand the cursor when hovering over interactive elements
      const interactables = document.querySelectorAll('a, button, .filter-btn, .tag, input, select, textarea, .nav-item, .task-row');
      
      interactables.forEach(el => {
        el.addEventListener('mouseenter', () => {
          if(ring) ring.classList.add('hovered');
          if(dot) dot.classList.add('hovered');
        });
        el.addEventListener('mouseleave', () => {
          if(ring) ring.classList.remove('hovered');
          if(dot) dot.classList.remove('hovered');
        });
      });
    }
    const outfitDatabase = {
      boardroom: {
        warm: { base: "Crisp White Poplin Shirt (No Tie)", outer: "Unlined Navy Linen Blend Blazer", pants: "Light Grey Tropical Wool Trousers", shoes: "Dark Brown Penny Loafers", acc: "Steel Dress Watch with Brown Leather Strap", fragrance: "Creed Aventus (Fresh/Fruity)" },
        mild: { base: "Light Blue Oxford Shirt with Silk Tie", outer: "Charcoal Worsted Wool Suit Jacket", pants: "Matching Charcoal Worsted Trousers", shoes: "Black Wholecut Oxfords", acc: "Minimalist Silver Cufflinks", fragrance: "Bleu de Chanel Eau de Parfum" },
        cold: { base: "White Twill Shirt", outer: "Navy Flannel Suit Jacket", pants: "Matching Navy Flannel Trousers", shoes: "Black Cap-Toe Oxfords", acc: "Cashmere Scarf in Charcoal", fragrance: "Tom Ford Oud Wood" }
      },
      date: {
        warm: { base: "Navy Short-Sleeve Knit Polo", outer: "None / Lightweight Steel Chronograph Watch", pants: "Tailored Cream Chinos", shoes: "Minimalist White Leather Sneakers", acc: "Steel Chronograph Watch", fragrance: "Acqua di Gio Profumo" },
        mild: { base: "Black Fine-Gauge Merino Crewneck", outer: "Suede Café Racer Jacket", pants: "Dark Wash Selvedge Denim", shoes: "Suede Chelsea Boots", acc: "Minimalist Black Leather Belt", fragrance: "YSL La Nuit de L'Homme" },
        cold: { base: "Charcoal Cashmere Turtleneck", outer: "Camel Overcoat", pants: "Black Tailored Trousers", shoes: "Black Leather Chelsea Boots", acc: "Leather Gloves in Black", fragrance: "Maison Margiela Jazz Club" }
      },
      weekend: {
        warm: { base: "White Premium Cotton T-Shirt", outer: "Acetate Aviator Sunglasses", pants: "Navy Tailored Drawstring Trousers", shoes: "Minimalist White Leather Sneakers", acc: "Tortoiseshell Sunglasses", fragrance: "Tom Ford Neroli Portofino" },
        mild: { base: "Grey Marl Sweatshirt", outer: "Olive Field Jacket", pants: "Dark Wash Denim", shoes: "Suede Desert Boots", acc: "Canvas Tote Bag", fragrance: "Dior Sauvage" },
        cold: { base: "Heavyweight Navy Cable Knit Sweater", outer: "Quilted Gilet / Vest", pants: "Charcoal Flannel Trousers", shoes: "Brown Brogue Boots", acc: "Beanie in Navy Wool", fragrance: "Parfums de Marly Herod" }
      },
      event: {
        warm: { base: "White Dress Shirt", outer: "Midnight Blue Tuxedo Jacket", pants: "Midnight Blue Tuxedo Trousers", shoes: "Black Patent Leather Oxfords", acc: "Black Silk Bow Tie", fragrance: "Tom Ford Tuscan Leather" },
        mild: { base: "White Pique Shirt with Bowtie", outer: "Black Peak Lapel Tuxedo Jacket", pants: "Black Tuxedo Trousers with Silk Stripe", shoes: "Black Patent Leather Loafers", acc: "White Pocket Square", fragrance: "Creed Green Irish Tweed" },
        cold: { base: "White Dress Shirt", outer: "Black Velvet Dinner Jacket", pants: "Black Tuxedo Trousers", shoes: "Black Velvet Slippers", acc: "Silver Dress Studs", fragrance: "Amouage Interlude Man" }
      }
    };

    function generateOutfit() {
      const occasion = document.getElementById('occasion-select').value;
      const climate = document.getElementById('climate-select').value;
      const resultBox = document.getElementById('outfit-result');

      if (!occasion || !climate) {
        // Just a gentle visual shake if they forgot to select, rather than an annoying popup
        resultBox.style.display = 'none';
        return;
      }

      const suggestion = outfitDatabase[occasion][climate];

      // Populate text
      document.getElementById('res-base').innerText = suggestion.base;
      document.getElementById('res-outer').innerText = suggestion.outer;
      document.getElementById('res-pants').innerText = suggestion.pants;
      document.getElementById('res-shoes').innerText = suggestion.shoes;
      document.getElementById('res-acc').innerText = suggestion.acc;
      document.getElementById('res-fragrance').innerText = suggestion.fragrance;

      // Show result with animation
      resultBox.classList.remove('visible');
      
      setTimeout(() => {
        resultBox.style.display = 'block';
        setTimeout(() => {
          resultBox.classList.add('visible');
          // Scroll slightly down so they see it
          window.scrollBy({ top: 150, behavior: 'smooth' });
        }, 50);
      }, 100);
    }
  </script>
